<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Juegos - Game Price</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="../CSS/style.css">
</head>

<body>

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark sticky-top shadow">
        <div class="container">
            <a class="navbar-brand text-warning fw-bold" href="index.html">GAME PRICE</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="index.html">Inicio</a></li>
                    <li class="nav-item"><a class="nav-link" href="tiendas.html">Tiendas y Comparador</a></li>
                    <li class="nav-item"><a class="nav-link active" href="juegos.html">Ratings y Top 10</a></li>
                </ul>
                <div class="d-flex gap-2 ms-lg-3">
                    <button id="cambiar-color-oscuro" class="btn btn-sm btn-outline-light">🌙</button>
                    <button id="cambiar-color-claro" class="btn btn-sm btn-outline-warning">☀️</button>
                </div>
            </div>
        </div>
    </nav>

    <main class="container my-5">
        <div class="p-4 bg-light rounded-4 mb-5 shadow-sm">
            <h4 class="mb-3">Buscador con Filtros</h4>
            <div class="row g-2">
                <div class="col-md-6"><input type="text" class="form-control" placeholder="Buscar juego..."></div>
                <div class="col-md-4">
                    <select class="form-select">
                        <option>Consola (Todas)</option>
                        <option>PS5</option>
                        <option>Xbox Series</option>
                        <option>Switch</option>
                        <option>PC</option>
                    </select>
                </div>
                <div class="col-md-2 d-grid"><button class="btn btn-warning fw-bold">Buscar</button></div>
            </div>
        </div>

        <div class="row g-5">
            <div class="col-md-6">
                <h4 class="mb-3">Top 10 Juegos más buscados</h4>
                <ul class="list-group list-group-flush shadow-sm border rounded">
                    <li class="list-group-item d-flex justify-content-between align-items-center">
                        1. Elden Ring <span class="badge bg-primary">PS5</span>
                    </li>
                    <li class="list-group-item d-flex justify-content-between align-items-center">
                        2. Zelda: TotK <span class="badge bg-danger">Switch</span>
                    </li>
                    <li class="list-group-item d-flex justify-content-between align-items-center">
                        3. Baldur's Gate 3 <span class="badge bg-dark">PC</span>
                    </li>
                </ul>
            </div>

            <div class="col-md-6">
                <h4 class="mb-3">Sistema de Ratings</h4>
                <div class="card p-3 mb-3 border-start border-4 border-warning shadow-sm">
                    <div class="card-body">
                        <h5>Valoración de Prensa</h5>
                        <div class="display-5 fw-bold text-warning">88 / 100</div>
                    </div>
                </div>
                <div class="card p-3 mb-3 border-start border-4 border-success shadow-sm">
                    <div class="card-body">
                        <h5>Reseñas de Usuarios</h5>
                        <div class="display-5 fw-bold text-success">4.8 / 5.0</div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <div class="social-container">
        <div class="social-buttons-stack">
            <button onclick="openWhatsApp()" class="social-btn-appear whatsapp-appear" data-tooltip="WhatsApp">
                <i class="bi bi-whatsapp"></i>
            </button>
            <button onclick="openInstagram()" class="social-btn-appear instagram-appear" data-tooltip="Instagram">
                <i class="bi bi-instagram"></i>
            </button>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../JS/script.js"></script>
</body>

</html>
