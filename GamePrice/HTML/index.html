<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GamePrice - Inicio</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="../CSS/style.css">
</head>

<body>

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark sticky-top shadow">
        <div class="container">
            <a class="navbar-brand text-warning fw-bold" href="index.html">GAME PRICE</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link active" href="index.html">Inicio</a></li>
                    <li class="nav-item"><a class="nav-link" href="tiendas.html">Tiendas y Comparador</a></li>
                    <li class="nav-item"><a class="nav-link" href="juegos.html">Ratings y Top 10</a></li>
                </ul>
                <div class="d-flex gap-2 ms-lg-3">
                    <button id="cambiar-color-oscuro" class="btn btn-sm btn-outline-light">🌙</button>
                    <button id="cambiar-color-claro" class="btn btn-sm btn-outline-warning">☀️</button>
                </div>
            </div>
        </div>
    </nav>

    <header class="p-5 mb-4 bg-primary text-white text-center shadow">
        <div class="container py-5">
            <h1 class="display-4 fw-bold">⚡ Ofertas Flash del Día</h1>
            <p class="fs-4">Encontramos los precios más bajos en Steam, Epic y Tiendas Físicas.</p>
            <a href="tiendas.html" class="btn btn-warning btn-lg px-4">Ver Comparador</a>
        </div>
    </header>

    <main class="container my-5">
        <div class="row g-4 text-center">
            <div class="col-md-4">
                <div class="card h-100 border-0 shadow-sm p-3">
                    <h3>Listado de Consolas</h3>
                    <p>Encuentra stock de PS5, Xbox Series X y Switch.</p>
                </div>
            </div>
        </div>

        <div class="row justify-content-center mt-5">
            <div class="col-md-6 card p-4 shadow-sm border-0">
                <h2 class="text-center mb-4">Únete a la Comunidad</h2>
                <form id="myForm">
                    <div class="mb-3">
                        <label class="form-label">Nombre</label>
                        <input type="text" id="nombre" class="form-control" placeholder="Tu nombre">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Email</label>
                        <input type="email" id="email" class="form-control" placeholder="nombre@correo.com">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Contraseña</label>
                        <input type="password" id="password" class="form-control">
                    </div>
                    <button type="submit" class="btn btn-primary w-100">Registrarme</button>
                </form>
            </div>
        </div>
    </main>

    <div class="social-container">
        <div class="social-buttons-stack">
            <button onclick="openWhatsApp()" class="social-btn-appear whatsapp-appear" data-tooltip="WhatsApp">
                <i class="bi bi-whatsapp"></i>
            </button>
            <button onclick="openInstagram()" class="social-btn-appear instagram-appear" data-tooltip="Instagram">
                <i class="bi bi-instagram"></i>
            </button>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../JS/script.js"></script>
</body>

</html>
