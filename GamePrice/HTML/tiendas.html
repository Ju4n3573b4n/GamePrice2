<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tiendas - Game Price</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="../CSS/style.css">
</head>

<body class="bg-light">

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark sticky-top shadow">
        <div class="container">
            <a class="navbar-brand text-warning fw-bold" href="index.html">GAME PRICE</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="index.html">Inicio</a></li>
                    <li class="nav-item"><a class="nav-link active" href="tiendas.html">Tiendas y Comparador</a></li>
                    <li class="nav-item"><a class="nav-link" href="juegos.html">Ratings y Top 10</a></li>
                </ul>
                <div class="d-flex gap-2 ms-lg-3">
                    <button id="cambiar-color-oscuro" class="btn btn-sm btn-outline-light">🌙</button>
                    <button id="cambiar-color-claro" class="btn btn-sm btn-outline-warning">☀️</button>
                </div>
            </div>
        </div>
    </nav>

    <main class="container my-5">
        <h2 class="mb-4">Módulo de Comparación</h2>
        <div class="row g-4">
            <div class="col-md-4">
                <div class="list-group shadow">
                    <div class="list-group-item bg-primary text-white fw-bold">Tiendas Digitales</div>
                    <a href="#" class="list-group-item list-group-item-action">Steam</a>
                    <a href="#" class="list-group-item list-group-item-action">Epic Games Store</a>
                    <div class="list-group-item bg-secondary text-white fw-bold">Tiendas Físicas</div>
                    <a href="#" class="list-group-item list-group-item-action">Amazon</a>
                    <a href="#" class="list-group-item list-group-item-action">GameStop</a>
                </div>
            </div>

            <div class="col-md-8">
                <div class="card p-4 border-0 shadow">
                    <table class="table table-hover">
                        <thead class="table-dark">
                            <tr>
                                <th>Tienda</th>
                                <th>Precio</th>
                                <th>Acción</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr>
                                <td>Instant Gaming</td>
                                <td><span class="fw-bold text-success">$24.50</span></td>
                                <td><button class="btn btn-sm btn-primary">Ir a Tienda</button></td>
                            </tr>
                            <tr>
                                <td>Retailer Local</td>
                                <td><span class="fw-bold">$45.00</span></td>
                                <td><button class="btn btn-sm btn-outline-primary">Ver Ubicación</button></td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>

    <div class="social-container">
        <div class="social-buttons-stack">
            <button onclick="openWhatsApp()" class="social-btn-appear whatsapp-appear" data-tooltip="WhatsApp">
                <i class="bi bi-whatsapp"></i>
            </button>
            <button onclick="openInstagram()" class="social-btn-appear instagram-appear" data-tooltip="Instagram">
                <i class="bi bi-instagram"></i>
            </button>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../JS/script.js"></script>
</body>

</html>
